<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Recruitment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // A simple card that doesn't rely on external icon libraries
        const KpiCard = ({ title, value, colorClass, bgColor }) => (
            <div className="bg-white rounded-xl p-5 border border-slate-200 shadow-sm transition-all">
                <p className="text-xs font-bold text-slate-500 uppercase tracking-wider">{title}</p>
                <p className={`text-3xl font-bold mt-2 ${colorClass}`}>{value}</p>
                <div className={`mt-2 h-1 w-8 rounded ${bgColor}`}></div>
            </div>
        );

        const Dashboard = () => {
            const stats = {
                reqsProvided: 30,
                candidatesSubmitted: 42,
                candidatesRejected: 27,
                candidatesInProgress: 14,
                candidatesHired: 1
            };

            const allReqs = [
                { id: '251083', title: 'Staff Full Stack Software Engineer', location: 'Austin, TX', candidates: 4, hired: 0 },
                { id: '260165', title: 'Staff Software Engineer (Hive)', location: 'Poland', candidates: 1, hired: 1 },
                // Add more data here later
            ];

            return (
                <div className="min-h-screen pb-12 font-sans text-slate-900">
                    <header className="bg-white border-b border-slate-200 p-6 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black tracking-tight text-blue-600">RECRUITMENT PORTAL</h1>
                                <p className="text-sm font-medium text-slate-500">Cloudera & BairesDev Dashboard</p>
                            </div>
                            <div className="bg-slate-100 px-4 py-2 rounded-full text-xs font-bold text-slate-600 uppercase">March 2026</div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 mt-10 space-y-10">
                        {/* KPI SECTION */}
                        <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                            <KpiCard title="Requisitions" value={stats.reqsProvided} colorClass="text-slate-800" bgColor="bg-slate-800" />
                            <KpiCard title="Submitted" value={stats.candidatesSubmitted} colorClass="text-blue-600" bgColor="bg-blue-600" />
                            <KpiCard title="In Progress" value={stats.candidatesInProgress} colorClass="text-amber-500" bgColor="bg-amber-500" />
                            <KpiCard title="Rejected" value={stats.candidatesRejected} colorClass="text-red-500" bgColor="bg-red-500" />
                            <KpiCard title="Hired" value={stats.candidatesHired} colorClass="text-emerald-500" bgColor="bg-emerald-500" />
                        </div>

                        {/* PIPELINE SECTION */}
                        <div className="bg-white rounded-2xl p-8 border border-slate-200 shadow-sm">
                            <h2 className="text-xl font-bold mb-6">Candidate Pipeline Distribution</h2>
                            <div className="h-14 w-full flex rounded-xl overflow-hidden shadow-inner bg-slate-100">
                                <div className="bg-red-500 flex items-center justify-center text-white text-xs font-bold" style={{ width: '64%' }}>64% REJECTED</div>
                                <div className="bg-amber-400 flex items-center justify-center text-amber-900 text-xs font-bold" style={{ width: '33%' }}>33% ACTIVE</div>
                                <div className="bg-emerald-500 flex items-center justify-center text-white text-xs font-bold" style={{ width: '3%' }}>3% HIRED</div>
                            </div>
                        </div>

                        {/* TABLE SECTION */}
                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            <div className="p-6 border-b border-slate-100 bg-slate-50">
                                <h2 className="font-bold text-slate-800 uppercase tracking-widest text-sm">Active Requisitions</h2>
                            </div>
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-slate-400 text-[10px] uppercase font-black tracking-widest">
                                    <tr>
                                        <th className="px-6 py-4 text-center w-24">ID</th>
                                        <th className="px-6 py-4">Title & Location</th>
                                        <th className="px-6 py-4 text-center">Candidates</th>
                                        <th className="px-6 py-4 text-center">Hired</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {allReqs.map((req, i) => (
                                        <tr key={i} className="hover:bg-slate-50 transition-colors">
                                            <td className="px-6 py-4 text-center font-mono text-sm text-slate-400">{req.id}</td>
                                            <td className="px-6 py-4">
                                                <div className="font-bold text-slate-800">{req.title}</div>
                                                <div className="text-xs text-slate-500">{req.location}</div>
                                            </td>
                                            <td className="px-6 py-4 text-center font-bold text-blue-600">{req.candidates}</td>
                                            <td className="px-6 py-4 text-center font-bold text-emerald-600">{req.hired}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
