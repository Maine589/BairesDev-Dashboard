<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Recruitment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Ensure table header sticks correctly in the preview */
        .sticky-header { position: sticky; top: 0; z-index: 10; }
    </style>
</head>

                        <div dangerouslySetInnerHTML={{ __html: icon }} />
                    </div>
                </div>

                                <h2 className="text-lg font-semibold text-slate-800 flex items-center gap-2"><Building2 className="w-5 h-5 text-slate-400" />Active Requisitions</h2>
                            </div>
                            <div className="overflow-x-auto max-h-[500px]">
                                <table className="w-full text-left">
                                    <thead className="sticky top-0 bg-slate-50 shadow-sm z-10">
                                        <tr className="text-slate-500 text-xs uppercase font-semibold">
                                            <th className="px-6 py-4">Req ID</th>
                                            <th className="px-6 py-4">Job Title</th>
                                            <th className="px-6 py-4 text-center">Candidates</th>
                                            <th className="px-6 py-4 text-center">Hired</th>
                                        </tr>
                                    </thead>

                                                <td className="px-6 py-4 text-sm font-medium">{req.id}</td>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);

</body>
</html>
