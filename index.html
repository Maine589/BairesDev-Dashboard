<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Recruitment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Reusable KPI Card Component
        const KpiCard = ({ title, value, colorClass, bgColor }) => (
            <div className={`bg-white rounded-xl p-5 border border-slate-200 shadow-sm relative overflow-hidden group transition-all`}>
                <div className="flex justify-between items-start">
                    <div>
                        <p className="text-sm font-semibold text-slate-500 uppercase tracking-wide">{title}</p>
                        <p className="text-3xl font-bold text-slate-800 mt-2">{value}</p>
                    </div>
                    <div className={`p-3 rounded-lg ${bgColor} ${colorClass}`}>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    </div>
                </div>
            </div>
        );

        const Dashboard = () => {
            const stats = {
                reqsProvided: 30,
                candidatesSubmitted: 42,
                candidatesRejected: 27,
                candidatesInProgress: 14,
                candidatesHired: 1
            };

            const allReqs = [
                { id: '251083', title: 'Staff Full Stack Software Engineer...', location: 'US-Texas-Austin', candidates: 4, inProgress: 0, rejected: 4, hired: 0 },
                { id: '251090', title: 'Staff Software Engineer, Storage', location: 'Hungary-Remote', candidates: 0, inProgress: 0, rejected: 0, hired: 0 },
                { id: '251203', title: 'Staff Performance Engineer', location: 'Hungary-Budapest', candidates: 0, inProgress: 0, rejected: 0, hired: 0 },
                { id: '251251', title: 'Staff Software Engineer', location: 'US-Texas-Austin', candidates: 0, inProgress: 0, rejected: 0, hired: 0 },
                { id: '251276', title: 'Senior Staff Software Engineer', location: 'US-Georgia-Remote', candidates: 2, inProgress: 2, rejected: 0, hired: 0 },
                { id: '260165', title: 'Staff Software Engineer (Hive)', location: 'Poland', candidates: 1, inProgress: 0, rejected: 0, hired: 1 },
            ];

            return (
                <div className="min-h-screen pb-12 font-sans">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-20">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-lg text-white font-bold">BD</div>
                                <div>
                                    <h1 className="text-xl font-bold text-slate-800">Partner Recruitment Portal</h1>
                                    <p className="text-sm text-slate-500">Cloudera & BairesDev</p>
                                </div>
                            </div>
                            <div className="text-xs font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full uppercase">March 2026</div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 mt-8 space-y-8">
                        {/* KPI Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                            <KpiCard title="Reqs Provided" value={stats.reqsProvided} colorClass="text-indigo-600" bgColor="bg-indigo-50" />
                            <KpiCard title="Submitted" value={stats.candidatesSubmitted} colorClass="text-blue-600" bgColor="bg-blue-50" />
                            <KpiCard title="In Progress" value={stats.candidatesInProgress} colorClass="text-amber-600" bgColor="bg-amber-50" />
                            <KpiCard title="Rejected" value={stats.candidatesRejected} colorClass="text-red-600" bgColor="bg-red-50" />
                            <KpiCard title="Hired" value={stats.candidatesHired} colorClass="text-emerald-600" bgColor="bg-emerald-50" />
                        </div>

                        {/* Visual Pipeline */}
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
                            <h2 className="text-lg font-semibold text-slate-800 mb-6">Candidate Pipeline</h2>
                            <div className="h-12 w-full flex rounded-full overflow-hidden bg-slate-100 shadow-inner">
                                <div className="bg-red-500" style={{ width: '64%' }}></div>
                                <div className="bg-amber-400" style={{ width: '33%' }}></div>
                                <div className="bg-emerald-500" style={{ width: '3%' }}></div>
                            </div>
                            <div className="flex justify-between mt-4 text-xs font-bold text-slate-400 uppercase tracking-widest">
                                <span>Rejected (64%)</span>
                                <span>In Progress (33%)</span>
                                <span>Hired (3%)</span>
                            </div>
                        </div>

                        {/* Requisitions Table */}
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="px-6 py-5 border-b border-slate-200 bg-slate-50/50">
                                <h2 className="text-lg font-semibold text-slate-800">Active Requisitions</h2>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="text-slate-400 text-xs uppercase font-bold border-b border-slate-100">
                                            <th className="px-6 py-4">Req ID</th>
                                            <th className="px-6 py-4">Job Title & Location</th>
                                            <th className="px-6 py-4 text-center">Total</th>
                                            <th className="px-6 py-4 text-center">Hired</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {allReqs.map((req, i) => (
                                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-6 py-4 text-sm font-mono font-bold text-slate-400">{req.id}</td>
                                                <td className="px-6 py-4">
                                                    <div className="text-sm font-semibold text-slate-800">{req.title}</div>
                                                    <div className="text-xs text-slate-500">{req.location}</div>
                                                </td>
                                                <td className="px-6 py-4 text-center">
                                                    <span className="bg-slate-100 px-2 py-1 rounded text-xs font-bold text-slate-600">{req.candidates}</span>
                                                </td>
                                                <td className="px-6 py-4 text-center">
                                                    <span className={`px-2 py-1 rounded text-xs font-bold ${req.hired > 0 ? 'bg-emerald-100 text-emerald-700' : 'text-slate-200'}`}>
                                                        {req.hired}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
